<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Air Canvas</title>
    <!-- Use Google Fonts for UI and Handwriting -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Outfit:wght@300;500;700&display=swap"
        rel="stylesheet">

    <!-- MediaPipe hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d1117;
            /* Dark modern background */
            font-family: 'Outfit', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #videoElement {
            display: none;
            /* We only draw to canvas */
        }

        .canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* The actual canvas where we render video + physics */
        #outputCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* Mirrors the camera */
            transform: scaleX(-1);
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ui-overlay h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #ff007f, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ui-overlay p {
            margin: 8px 0;
            font-size: 15px;
            font-weight: 300;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #currentColorDisplay {
            margin-top: 15px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ff007f;
            border: 2px solid white;
            box-shadow: 0 0 12px rgba(255, 0, 127, 0.6);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: 500;
            z-index: 20;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            background: linear-gradient(90deg, #ff007f, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .shape-spawner {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 80%;
            gap: 15px;
            z-index: 10;
        }

        .shape-spawner button {
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .shape-spawner button:hover {
            background: rgba(255, 0, 127, 0.5);
            border-color: #ff007f;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div id="loading">Initializing Camera & AI Tracking...</div>

    <div class="canvas-container">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="outputCanvas"></canvas>
    </div>

    <div class="shape-spawner">
        <button onclick="spawnShape('cube')">📦 Cube</button>
        <button onclick="spawnShape('pyramid')">🔺 Pyramid</button>
        <button onclick="spawnShape('sphere')">🌐 Sphere</button>
        <button onclick="spawnShape('star')">⭐️ Star</button>
        <button onclick="spawnShape('planet')">🪐 Planet</button>
        <button onclick="spawnShape('galaxy')">🌌 Galaxy</button>
        <button onclick="spawnShape('net')">🕸️ Elastic Net</button>
    </div>

    <div class="ui-overlay">
        <h1> Air Canvas</h1>
        <p>🤙 <strong>Call Me:</strong> Erase (move across)</p>
        <p>☝️ <strong>Point Index:</strong> Draw / Write</p>
        <p>✌️ <strong>Peace Sign:</strong> Change Color</p>
        <p>🖖 <strong>Three Fingers:</strong> Undo Erase</p>
        <p>👌 <strong>Pinch:</strong> Drag Drawings</p>
        <p>👌🏼👌🏼 <strong>Two-Hand Pinch:</strong> Rotate & Zoom 3D</p>
        <p>👍 <strong>Thumbs Up:</strong> Shatter into Atoms</p>
        <p>👎 <strong>Thumbs Down:</strong> Assemble Atoms</p>
        <div id="currentColorDisplay"></div>
        <button id="toggleSymmetryBtn" onclick="toggleSymmetry()" style="margin-top: 15px; width: 100%; background: transparent; color: white; border: 1px solid #00f0ff; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Outfit'; transition: all 0.2s;">Symmetry: OFF</button>
        <div style="margin-top: 15px;">
            <label for="brushSizeSlider" style="display: block; font-size: 14px; font-weight: 300; margin-bottom: 5px;">Brush Size: <span id="brushSizeLabel">6</span></label>
            <input type="range" id="brushSizeSlider" min="1" max="40" value="6" style="width: 100%; cursor: pointer;">
        </div>
        <button id="toggleBrushStyleBtn" onclick="toggleBrushStyle()" style="margin-top: 15px; width: 100%; background: transparent; color: white; border: 1px solid #ff007f; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Outfit'; transition: all 0.2s;">Brush: SOLID</button>
        <button id="toggleZDepthBtn" onclick="toggleZDepthMode()" style="margin-top: 15px; width: 100%; background: transparent; color: white; border: 1px solid #ffd700; padding: 10px; border-radius: 8px; cursor: pointer; font-family: 'Outfit'; transition: all 0.2s;">3D Depth Tracking: OFF</button>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const loadingScreen = document.getElementById('loading');

        let currentBrushSize = 6;
        document.getElementById('brushSizeSlider').addEventListener('input', (e) => {
            currentBrushSize = parseInt(e.target.value);
            document.getElementById('brushSizeLabel').innerText = currentBrushSize;
        });

        let brushStyle = 'solid';
        function toggleBrushStyle() {
            brushStyle = brushStyle === 'solid' ? 'particle' : 'solid';
            const btn = document.getElementById('toggleBrushStyleBtn');
            btn.innerText = `Brush: ${brushStyle.toUpperCase()}`;
            btn.style.background = brushStyle === 'particle' ? 'rgba(255, 0, 127, 0.2)' : 'transparent';
        }

        let zDepthMode = false;
        function toggleZDepthMode() {
            zDepthMode = !zDepthMode;
            const btn = document.getElementById('toggleZDepthBtn');
            btn.innerText = `3D Depth Tracking: ${zDepthMode ? 'ON' : 'OFF'}`;
            btn.style.background = zDepthMode ? 'rgba(255, 215, 0, 0.2)' : 'transparent';
        }

        // Setup resize
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 3D Scene state
        let sceneAngleX = 0; // Pitch
        let sceneAngleY = 0; // Yaw
        let sceneVelocityX = 0; // Pitch momentum
        let sceneVelocityY = 0; // Yaw momentum
        let sceneScale = 1.0; // Zoom multiplier

        // 3D Projection Math
        function project3D(x, y, z) {
            let cx = x - canvasElement.width / 2;
            let cy = y - canvasElement.height / 2;
            let cz = z || 0;

            cx *= sceneScale;
            cy *= sceneScale;
            cz *= sceneScale;

            let cosY = Math.cos(sceneAngleY), sinY = Math.sin(sceneAngleY);
            let nx = cx * cosY - cz * sinY, nz = cx * sinY + cz * cosY;
            cx = nx; cz = nz;

            let cosX = Math.cos(sceneAngleX), sinX = Math.sin(sceneAngleX);
            let ny = cy * cosX - cz * sinX, nz2 = cy * sinX + cz * cosX;
            cy = ny; cz = nz2;

            let fov = 1000;
            let scale = fov / (fov + cz);
            if (scale < 0.1) scale = 0.1;

            return { x: cx * scale + canvasElement.width / 2, y: cy * scale + canvasElement.height / 2, z: cz, scale: scale };
        }

        function unproject3D(sx, sy, sz = 0) {
            let cx = sx - canvasElement.width / 2;
            let cy = sy - canvasElement.height / 2;
            let cz = sz; // Unproject onto explicit depth

            let cosX = Math.cos(-sceneAngleX), sinX = Math.sin(-sceneAngleX);
            let ny = cy * cosX - cz * sinX, nz2 = cy * sinX + cz * cosX;
            cy = ny; cz = nz2;

            let cosY = Math.cos(-sceneAngleY), sinY = Math.sin(-sceneAngleY);
            let nx = cx * cosY - cz * sinY, nz = cx * sinY + cz * cosY;
            cx = nx; cz = nz;

            cx /= sceneScale;
            cy /= sceneScale;
            cz /= sceneScale;

            return { x: cx + canvasElement.width / 2, y: cy + canvasElement.height / 2, z: cz };
        }

        // Drawing state
        const paths = []; // Array of {color, points: [{x, y}]}
        const colors = ['#ff007f', '#00f0ff', '#00ff00', '#ffd700', '#ff5722', '#ffffff'];
        let colorIndex = 0;
        let colorChangeCooldown = 0;

        // Particle System State
        let shatterState = 'INTACT'; // 'INTACT' | 'SHATTERED' | 'ASSEMBLING'
        let particles = [];
        let gestureCooldown = 0;
        
        // Elastic Net Physics Data
        const elasticNets = []; 

        // 3D Shape Spawner
        function spawnShape(type) {
            const color = colors[Math.floor(Math.random() * colors.length)];
            const cx = (Math.random() - 0.5) * 400;
            const cy = (Math.random() - 0.5) * 400;
            const cz = (Math.random() - 0.5) * 400;
            const size = 120; // Default geometry scale
            const hw = canvasElement.width / 2;
            const hh = canvasElement.height / 2;
            const groupId = Date.now() + Math.random();

            if (type === 'cube') {
                const s = size;
                const pts = [
                    [-s, -s, -s], [s, -s, -s], [s, s, -s], [-s, s, -s], [-s, -s, -s],
                    [-s, -s, s], [s, -s, s], [s, s, s], [-s, s, s], [-s, -s, s],
                    [-s, s, s], [-s, s, -s],
                    [s, s, -s], [s, s, s],
                    [s, -s, s], [s, -s, -s]
                ];
                paths.push({
                    groupId: groupId,
                    color: color,
                    points: pts.map(p => ({ x: hw + cx + p[0], y: hh + cy + p[1], z: cz + p[2] }))
                });
            } else if (type === 'pyramid') {
                const s = size;
                const pts = [
                    [-s, s, -s], [s, s, -s], [s, s, s], [-s, s, s], [-s, s, -s],
                    [0, -s, 0],
                    [s, s, -s], [0, -s, 0],
                    [s, s, s], [0, -s, 0],
                    [-s, s, s]
                ];
                paths.push({
                    groupId: groupId,
                    color: color,
                    points: pts.map(p => ({ x: hw + cx + p[0], y: hh + cy + p[1], z: cz + p[2] }))
                });
            } else if (type === 'sphere') {
                const steps = 30;
                let p1 = [];
                for (let i = 0; i <= steps; i++) {
                    const a = (i / steps) * Math.PI * 2;
                    p1.push({ x: hw + cx + Math.cos(a) * size, y: hh + cy + Math.sin(a) * size, z: cz });
                }
                paths.push({ groupId: groupId, color: color, points: p1 });
                let p2 = [];
                for (let i = 0; i <= steps; i++) {
                    const a = (i / steps) * Math.PI * 2;
                    p2.push({ x: hw + cx + Math.cos(a) * size, y: hh + cy, z: cz + Math.sin(a) * size });
                }
                paths.push({ groupId: groupId, color: color, points: p2 });
                let p3 = [];
                for (let i = 0; i <= steps; i++) {
                    const a = (i / steps) * Math.PI * 2;
                    p3.push({ x: hw + cx, y: hh + cy + Math.cos(a) * size, z: cz + Math.sin(a) * size });
                }
                paths.push({ groupId: groupId, color: color, points: p3 });
            } else if (type === 'planet') {
                const steps = 30;
                let p1 = [];
                for (let i = 0; i <= steps; i++) {
                    const a = (i / steps) * Math.PI * 2;
                    p1.push({ x: hw + cx + Math.cos(a) * size, y: hh + cy + Math.sin(a) * size, z: cz });
                }
                paths.push({ groupId: groupId, color: color, points: p1 });
                let p2 = [];
                for (let i = 0; i <= steps; i++) {
                    const a = (i / steps) * Math.PI * 2;
                    p2.push({ x: hw + cx + Math.cos(a) * size, y: hh + cy, z: cz + Math.sin(a) * size });
                }
                paths.push({ groupId: groupId, color: color, points: p2 });

                // Saturn Rings
                let ring1 = [];
                let ring2 = [];
                for (let i = 0; i <= steps; i++) {
                    const a = (i / steps) * Math.PI * 2;
                    ring1.push({ x: hw + cx + Math.cos(a) * size * 1.6, y: hh + cy + Math.sin(a) * size * 1.6, z: cz });
                    ring2.push({ x: hw + cx + Math.cos(a) * size * 1.9, y: hh + cy + Math.sin(a) * size * 1.9, z: cz });
                }
                paths.push({ groupId: groupId, color: '#ffd700', points: ring1 });
                paths.push({ groupId: groupId, color: '#ff5722', points: ring2 });

            } else if (type === 'star') {
                const s = size * 1.5;
                const pts = [];
                for (let i = 0; i <= 10; i++) {
                    const r = i % 2 === 0 ? s : s * 0.4;
                    const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
                    pts.push({ x: hw + cx + Math.cos(a) * r, y: hh + cy + Math.sin(a) * r, z: cz });
                }
                paths.push({ groupId: groupId, color: '#ffd700', points: pts }); // Gold!

            } else if (type === 'galaxy') {
                const arms = 3;
                const spirals = 2.5;
                for (let arm = 0; arm < arms; arm++) {
                    const pts = [];
                    const armOffset = (arm / arms) * Math.PI * 2;
                    for (let i = 0; i < 80; i++) {
                        const r = (i / 80) * size * 2.5;
                        const a = armOffset + (i / 80) * Math.PI * 2 * spirals;
                        // adding slight Z-jitter so it behaves like a starfield cloud rather than perfectly flat ribbon
                        const randZ = (Math.random() - 0.5) * size * 0.4;
                        pts.push({ x: hw + cx + Math.cos(a) * r, y: hh + cy + Math.sin(a) * r, z: cz + randZ });
                    }
                    paths.push({ groupId: groupId, color: Math.random() > 0.5 ? '#00f0ff' : '#ff007f', points: pts });
                }
            } else if (type === 'net') {
                const cols = 8;
                const rows = 8;
                const spacing = 30; // Distance between nodes
                const netNodes = [];
                const netSprings = [];
                const startX = hw + cx - ((cols-1) * spacing) / 2;
                const startY = hh + cy - ((rows-1) * spacing) / 2;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        netNodes.push({
                            x: startX + c * spacing,
                            y: startY + r * spacing,
                            z: cz,
                            vx: 0, vy: 0, vz: 0,
                            // Lock tops
                            locked: r === 0 
                        });
                    }
                }

                const getIdx = (r, c) => r * cols + c;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const i = getIdx(r, c);
                        if (c < cols - 1) netSprings.push({ n1: i, n2: getIdx(r, c + 1), rest: spacing }); // Horizontal
                        if (r < rows - 1) netSprings.push({ n1: i, n2: getIdx(r + 1, c), rest: spacing }); // Vertical
                    }
                }

                elasticNets.push({ color: color, nodes: netNodes, springs: netSprings });
            }
        }

        // Symmetry state
        let symmetryMode = false;
        function toggleSymmetry() {
            symmetryMode = !symmetryMode;
            const btn = document.getElementById('toggleSymmetryBtn');
            btn.innerText = `Symmetry: ${symmetryMode ? 'ON' : 'OFF'}`;
            btn.style.background = symmetryMode ? 'rgba(0, 240, 255, 0.2)' : 'transparent';
        }

        // Undo state
        const undoStack = [];
        let currentEraseSession = [];
        let undoCooldown = 0;
        let lastZoomDist = null;

        // Hand State Arrays (supports up to 2 hands)
        let currentPaths = [null, null];
        let lastGestures = ['HOVER', 'HOVER'];
        let draggedObjects = [null, null];
        let lastPinchMidXs = [0, 0];
        let lastPinchMidYs = [0, 0];
        let isCurrentlyPinchings = [false, false];
        let lastDualPinchMidX = null;
        let lastDualPinchMidY = null;

        // Smoothing states
        let sPxs = [null, null], sPys = [null, null], sPzs = [null, null];
        let sPinchXs = [null, null], sPinchYs = [null, null];
        let sPalmXs = [null, null], sPalmYs = [null, null];
        let gestureHistory = [[], []];

        // Helper to check if a finger is extended
        function isFingerExtended(landmarks, tipIndex, dipIndex) {
            const tip = landmarks[tipIndex];
            const dip = landmarks[dipIndex];
            const wrist = landmarks[0];

            // Compare distance from wrist to tip vs wrist to dip
            const tipDist = Math.hypot(tip.x - wrist.x, tip.y - wrist.y);
            const dipDist = Math.hypot(dip.x - wrist.x, dip.y - wrist.y);
            return tipDist > dipDist;
        }

        // --- MEDIAPIPE LOGIC ---
        function onResults(results) {
            if (loadingScreen.style.display !== 'none') {
                loadingScreen.style.display = 'none';
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Draw video frame
            canvasCtx.globalAlpha = 0.4;
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalAlpha = 1.0;

            // Apply rotation momentum and friction
            sceneAngleX += sceneVelocityX;
            sceneAngleY += sceneVelocityY;
            sceneVelocityX *= 0.88; // Friction deceleration
            sceneVelocityY *= 0.88;

            // Draw existing paths
            for (const path of paths) {
                if (path.points.length < 2) continue;
                if (path.shattered && shatterState !== 'INTACT') continue; // Hide shattered paths
                
                if (path.style !== 'particle') {
                    canvasCtx.beginPath();
                    const p0 = project3D(path.points[0].x, path.points[0].y, path.points[0].z || 0);
                    canvasCtx.moveTo(p0.x, p0.y);
                    for (let i = 1; i < path.points.length; i++) {
                        const pi = project3D(path.points[i].x, path.points[i].y, path.points[i].z || 0);
                        canvasCtx.lineTo(pi.x, pi.y);
                    }

                    const pathScale = p0.scale; // use start point scale for thickness

                    // Highlight if grabbed by either hand
                    const isPathDragged = (draggedObjects[0] && draggedObjects[0].type === 'pathGroup' && draggedObjects[0].refs.includes(path)) ||
                        (draggedObjects[1] && draggedObjects[1].type === 'pathGroup' && draggedObjects[1].refs.includes(path));

                    canvasCtx.lineCap = 'round';
                    canvasCtx.lineJoin = 'round';

                    const baseColor = isPathDragged ? '#ffffff' : path.color;
                    const pSize = path.size || 6;
                    const baseWidth = (isPathDragged ? pSize * 2 : pSize) * pathScale * sceneScale;

                    // Neon Glow (Outer)
                    canvasCtx.strokeStyle = baseColor;
                    canvasCtx.lineWidth = baseWidth * 1.8;
                    canvasCtx.shadowColor = baseColor;
                    canvasCtx.shadowBlur = 25 * pathScale;
                    canvasCtx.stroke();

                    // Bright Core (Inner)
                    canvasCtx.strokeStyle = isPathDragged ? '#ffffff' : '#ffffff80'; // brighter core
                    canvasCtx.lineWidth = baseWidth * 0.4;
                    canvasCtx.shadowBlur = 5 * pathScale;
                    canvasCtx.stroke();
                } else {
                    // Volumetric Particle Style
                    const time = Date.now() * 0.003;
                    canvasCtx.fillStyle = path.color;
                    canvasCtx.shadowColor = path.color;
                    canvasCtx.shadowBlur = 10;
                    for (let i = 0; i < path.points.length; i += 2) {
                        const pt = path.points[i];
                        const proj = project3D(pt.x, pt.y, pt.z || 0);
                        const radiusOffset = (path.size || 6) * 1.5;
                        
                        for(let part=0; part<3; part++) {
                            const offsetTime = time + part * (Math.PI * 2 / 3) + i * 0.15;
                            const px = proj.x + Math.cos(offsetTime) * radiusOffset * proj.scale;
                            const py = proj.y + Math.sin(offsetTime) * radiusOffset * proj.scale;
                            
                            canvasCtx.beginPath();
                            const particleSize = Math.max(0.2, (Math.sin(offsetTime + i) * 1.5 + 2)) * proj.scale;
                            canvasCtx.arc(px, py, particleSize, 0, Math.PI * 2);
                            canvasCtx.fill();
                        }
                    }
                }
                canvasCtx.shadowBlur = 0;
            }
            
            // Render Elastic Nets
            for (const net of elasticNets) {
                // Physics solve
                for(let iter=0; iter<3; iter++) {
                    for(const spring of net.springs) {
                        const n1 = net.nodes[spring.n1];
                        const n2 = net.nodes[spring.n2];
                        let dx = n2.x - n1.x;
                        let dy = n2.y - n1.y;
                        let dz = n2.z - n1.z;
                        let dist = Math.hypot(dx, dy, dz);
                        if (dist === 0) dist = 0.001;
                        let diff = (dist - spring.rest) / dist;
                        let forceX = dx * diff * 0.5;
                        let forceY = dy * diff * 0.5;
                        let forceZ = dz * diff * 0.5;
                        if (!n1.locked) { n1.x -= forceX; n1.y -= forceY; n1.z -= forceZ; }
                        if (!n2.locked) { n2.x += forceX; n2.y += forceY; n2.z += forceZ; }
                    }
                }
                
                // Motion and drag
                const isNetDragged = (draggedObjects[0] && draggedObjects[0].type === 'netNode' && net.nodes.includes(draggedObjects[0].node)) ||
                                     (draggedObjects[1] && draggedObjects[1].type === 'netNode' && net.nodes.includes(draggedObjects[1].node));

                for(const node of net.nodes) {
                    if (!node.locked && !(draggedObjects[0] && draggedObjects[0].node === node) && !(draggedObjects[1] && draggedObjects[1].node === node)) {
                        node.vy += 0.5; // Gravity
                        node.x += node.vx; node.y += node.vy; node.z += node.vz;
                        node.vx *= 0.8; node.vy *= 0.8; node.vz *= 0.8;
                    }
                }

                // Render structure
                canvasCtx.strokeStyle = isNetDragged ? '#ffffff' : net.color;
                canvasCtx.shadowBlur = isNetDragged ? 20 : 5;
                canvasCtx.shadowColor = canvasCtx.strokeStyle;
                canvasCtx.lineWidth = (isNetDragged ? 4 : 2) * sceneScale;
                canvasCtx.beginPath();
                for(const spring of net.springs) {
                    const p1 = project3D(net.nodes[spring.n1].x, net.nodes[spring.n1].y, net.nodes[spring.n1].z);
                    const p2 = project3D(net.nodes[spring.n2].x, net.nodes[spring.n2].y, net.nodes[spring.n2].z);
                    canvasCtx.moveTo(p1.x, p1.y);
                    canvasCtx.lineTo(p2.x, p2.y);
                }
                canvasCtx.stroke();
                canvasCtx.shadowBlur = 0;
            }

            // Draw and update particle physics
            if (shatterState !== 'INTACT') {
                let allAssembled = true;
                particles.forEach(p => {
                    if (shatterState === 'SHATTERED') {
                        // Float around
                        p.x += p.vx; p.y += p.vy; p.z += p.vz;
                        p.vx *= 0.95; p.vy *= 0.95; p.vz *= 0.95; // Friction
                        // Add some small wander/noise
                        p.vx += (Math.random() - 0.5) * 0.8;
                        p.vy += (Math.random() - 0.5) * 0.8;
                        p.vz += (Math.random() - 0.5) * 0.8;
                    } else if (shatterState === 'ASSEMBLING') {
                        // Seek target pos
                        let dx = p.targetX - p.x;
                        let dy = p.targetY - p.y;
                        let dz = p.targetZ - p.z;
                        p.vx += dx * 0.05;
                        p.vy += dy * 0.05;
                        p.vz += dz * 0.05;
                        p.vx *= 0.85; p.vy *= 0.85; p.vz *= 0.85; // Dampening
                        p.x += p.vx; p.y += p.vy; p.z += p.vz;

                        // Check if practically assembled
                        if (Math.abs(dx) > 3 || Math.abs(dy) > 3 || Math.abs(dz) > 3) {
                            allAssembled = false;
                        }
                    }

                    // Render atom
                    const proj = project3D(p.x, p.y, p.z);
                    canvasCtx.fillStyle = p.color;
                    canvasCtx.beginPath();
                    canvasCtx.arc(proj.x, proj.y, Math.max(0.5, p.scale * proj.scale * sceneScale), 0, Math.PI * 2);
                    canvasCtx.fill();
                });

                // If assembling and all converged
                if (shatterState === 'ASSEMBLING' && allAssembled) {
                    shatterState = 'INTACT';
                    particles = []; // Clear array
                    paths.forEach(path => path.shattered = false); // Restore shapes
                }
            }

            if (colorChangeCooldown > 0) colorChangeCooldown--;
            if (undoCooldown > 0) undoCooldown--;
            if (gestureCooldown > 0) gestureCooldown--;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {

                // Track if either hand actively erased during this frame
                let didAnyHandErase = false;

                // Pre-compute pinch state for zooming logic
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    if (index > 1) return;
                    const indexTip = landmarks[8];
                    const thumbTip = landmarks[4];
                    const pinchDist = Math.hypot(indexTip.x - thumbTip.x, indexTip.y - thumbTip.y);
                    if (isCurrentlyPinchings[index]) {
                        if (pinchDist > 0.12) isCurrentlyPinchings[index] = false;
                    } else {
                        if (pinchDist < 0.06) isCurrentlyPinchings[index] = true;
                    }
                });

                const isDualPinch = results.multiHandLandmarks.length === 2 && isCurrentlyPinchings[0] && isCurrentlyPinchings[1];

                results.multiHandLandmarks.forEach((landmarks, index) => {
                    if (index > 1) return; // Only process up to max 2 hands

                    const thumbExtended = isFingerExtended(landmarks, 4, 3);
                    const indexExtended = isFingerExtended(landmarks, 8, 6);
                    const middleExtended = isFingerExtended(landmarks, 12, 10);
                    const ringExtended = isFingerExtended(landmarks, 16, 14);
                    const pinkyExtended = isFingerExtended(landmarks, 20, 18);

                    const indexTip = landmarks[8];
                    const thumbTip = landmarks[4];

                    let gesture = 'HOVER';
                    if (isCurrentlyPinchings[index]) {
                        gesture = isDualPinch ? 'ZOOM' : 'PINCH';
                    } else if (indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                        gesture = 'DRAW';
                    } else if (indexExtended && middleExtended && !ringExtended && !pinkyExtended) {
                        gesture = 'PEACE';
                    } else if (indexExtended && middleExtended && ringExtended && !pinkyExtended) {
                        gesture = 'UNDO';
                    } else if (thumbExtended && !indexExtended && !middleExtended && !ringExtended && pinkyExtended) {
                        gesture = 'PALM'; // Mapped 'Call Me' gesture to eraser
                    } else if (!indexExtended && !middleExtended && !ringExtended && !pinkyExtended) {
                        // 4 fingers are closed. Distinguish Thumbs up, Thumbs down, and Fist.
                        const thumbDy = landmarks[4].y - landmarks[0].y;
                        if (thumbExtended && thumbDy < -0.08) {
                            gesture = 'SHATTER'; // Thumbs up
                        } else if (thumbExtended && thumbDy > 0.08) {
                            gesture = 'ASSEMBLE'; // Thumbs down
                        } else {
                            gesture = 'FIST'; // Thumbs tucked or sideways
                        }
                    }

                    // Smooth gestures (Debounce) to prevent flickering
                    gestureHistory[index].push(gesture);
                    if (gestureHistory[index].length > 5) gestureHistory[index].shift();

                    const gestureCounts = {};
                    let maxGesture = gesture;
                    let maxCount = 0;
                    for (const g of gestureHistory[index]) {
                        gestureCounts[g] = (gestureCounts[g] || 0) + 1;
                        if (gestureCounts[g] > maxCount) {
                            maxCount = gestureCounts[g];
                            maxGesture = g;
                        }
                    }
                    gesture = maxGesture; // Use the most frequent gesture in our recent history

                    // Raw coordinates
                    const pxRaw = indexTip.x * canvasElement.width;
                    const pyRaw = indexTip.y * canvasElement.height;
                    const pinchMidXRaw = ((indexTip.x + thumbTip.x) / 2) * canvasElement.width;
                    const pinchMidYRaw = ((indexTip.y + thumbTip.y) / 2) * canvasElement.height;

                    // Get Palm Center for erasing
                    const palmCenter = landmarks[9];
                    const palmXRaw = palmCenter.x * canvasElement.width;
                    const palmYRaw = palmCenter.y * canvasElement.height;

                    // Z-Depth estimation from palm scale
                    const handSize = Math.hypot(landmarks[0].x - landmarks[9].x, landmarks[0].y - landmarks[9].y);
                    const pzRaw = zDepthMode ? -(handSize - 0.12) * 5000 : 0;

                    // Smooth coordinates
                    const alpha = 0.40; // Sweet spot: responsive but smooths out AI hand jitter
                    if (sPxs[index] === null) { sPxs[index] = pxRaw; sPys[index] = pyRaw; sPzs[index] = pzRaw; } else { sPxs[index] += (pxRaw - sPxs[index]) * alpha; sPys[index] += (pyRaw - sPys[index]) * alpha; sPzs[index] += (pzRaw - sPzs[index]) * alpha; }
                    if (sPinchXs[index] === null) { sPinchXs[index] = pinchMidXRaw; sPinchYs[index] = pinchMidYRaw; } else { sPinchXs[index] += (pinchMidXRaw - sPinchXs[index]) * alpha; sPinchYs[index] += (pinchMidYRaw - sPinchYs[index]) * alpha; }
                    if (sPalmXs[index] === null) { sPalmXs[index] = palmXRaw; sPalmYs[index] = palmYRaw; } else { sPalmXs[index] += (palmXRaw - sPalmXs[index]) * alpha; sPalmYs[index] += (palmYRaw - sPalmYs[index]) * alpha; }

                    const px = sPxs[index];
                    const py = sPys[index];
                    const pz = sPzs[index];
                    const pinchMidX = sPinchXs[index];
                    const pinchMidY = sPinchYs[index];
                    const palmX = sPalmXs[index];
                    const palmY = sPalmYs[index];

                    // Handle pinch/drag gesture
                    if (gesture === 'PINCH') {
                        if (!draggedObjects[index]) {
                            let closest = null;
                            let minDist = 70;

                            // Check drawing paths
                            for (const path of paths) {
                                for (const pt of path.points) {
                                    const proj = project3D(pt.x, pt.y, pt.z || 0);
                                    const dist = Math.hypot(proj.x - pinchMidX, proj.y - pinchMidY);
                                    if (dist < minDist) {
                                        minDist = dist;
                                        closest = { type: 'path', ref: path };
                                    }
                                }
                            }

                            // Check elastic nets
                            for (const net of elasticNets) {
                                for (const node of net.nodes) {
                                    const proj = project3D(node.x, node.y, node.z);
                                    const dist = Math.hypot(proj.x - pinchMidX, proj.y - pinchMidY);
                                    if (dist < minDist) {
                                        minDist = dist;
                                        closest = { type: 'netNode', node: node };
                                    }
                                }
                            }

                            if (closest && closest.type === 'path') {
                                let selectedPaths = [closest.ref];
                                if (closest.ref.groupId) {
                                    selectedPaths = paths.filter(p => p.groupId === closest.ref.groupId);
                                }
                                draggedObjects[index] = { type: 'pathGroup', refs: selectedPaths };
                                lastPinchMidXs[index] = pinchMidX;
                                lastPinchMidYs[index] = pinchMidY;
                            } else if (closest && closest.type === 'netNode') {
                                draggedObjects[index] = closest;
                                lastPinchMidXs[index] = pinchMidX;
                                lastPinchMidYs[index] = pinchMidY;
                            }
                        }

                        if (draggedObjects[index]) {
                            if (draggedObjects[index].type === 'pathGroup') {
                                const moveP1 = unproject3D(lastPinchMidXs[index], lastPinchMidYs[index]);
                                const moveP2 = unproject3D(pinchMidX, pinchMidY);
                                const realDx = moveP2.x - moveP1.x;
                                const realDy = moveP2.y - moveP1.y;
                                const realDz = moveP2.z - moveP1.z;

                                for (const ref of draggedObjects[index].refs) {
                                    for (const pt of ref.points) {
                                        pt.x += realDx;
                                        pt.y += realDy;
                                        pt.z = (pt.z || 0) + realDz;
                                    }
                                }
                            } else if (draggedObjects[index].type === 'netNode') {
                                const moveP1 = unproject3D(lastPinchMidXs[index], lastPinchMidYs[index], draggedObjects[index].node.z);
                                const moveP2 = unproject3D(pinchMidX, pinchMidY, draggedObjects[index].node.z);
                                const realDx = moveP2.x - moveP1.x;
                                const realDy = moveP2.y - moveP1.y;
                                const realDz = moveP2.z - moveP1.z;

                                const node = draggedObjects[index].node;
                                node.x += realDx;
                                node.y += realDy;
                                node.z += realDz;
                                node.vx = realDx * 0.5;
                                node.vy = realDy * 0.5;
                                node.vz = realDz * 0.5;
                            }

                            lastPinchMidXs[index] = pinchMidX;
                            lastPinchMidYs[index] = pinchMidY;
                        }
                    } else {
                        draggedObjects[index] = null;
                    }

                    // Handle draw gesture
                    if (gesture === 'DRAW') {
                        if (lastGestures[index] !== 'DRAW') {
                            const groupId = Date.now() + Math.random();
                            currentPaths[index] = { groupId: groupId, color: colors[colorIndex], size: currentBrushSize, style: brushStyle, points: [] };
                            paths.push(currentPaths[index]);
                            if (symmetryMode) {
                                currentPaths[index].symPaths = [];
                                for (let s = 1; s < 8; s++) {
                                    let sp = { groupId: groupId, color: colors[colorIndex], size: currentBrushSize, style: brushStyle, points: [] };
                                    currentPaths[index].symPaths.push(sp);
                                    paths.push(sp);
                                }
                            }
                        }
                        if (currentPaths[index]) {
                            const p3d = unproject3D(px, py, pz);
                            
                            // Prevent micro-jitter strokes when hand is still
                            let addPoint = true;
                            const pts = currentPaths[index].points;
                            if (pts.length > 0) {
                                const lastPt = pts[pts.length - 1];
                                if (Math.hypot(p3d.x - lastPt.x, p3d.y - lastPt.y) < 2.5) addPoint = false;
                            }

                            if (addPoint) {
                                currentPaths[index].points.push(p3d);
                                if (currentPaths[index].symPaths) {
                                    const hw = canvasElement.width / 2;
                                    const hh = canvasElement.height / 2;
                                    const cx = p3d.x - hw;
                                    const cy = p3d.y - hh;
                                    const r = Math.hypot(cx, cy);
                                    const a0 = Math.atan2(cy, cx);
                                    for(let s=0; s<7; s++) {
                                        const a = a0 + ((s + 1) * Math.PI / 4);
                                        currentPaths[index].symPaths[s].points.push({
                                            x: hw + Math.cos(a) * r,
                                            y: hh + Math.sin(a) * r,
                                            z: p3d.z
                                        });
                                    }
                                }
                            }
                        }
                    } else {
                        currentPaths[index] = null;
                    }

                    // Handle color change gesture (Peace sign)
                    if (gesture === 'PEACE' && colorChangeCooldown === 0) {
                        colorIndex = (colorIndex + 1) % colors.length;
                        colorChangeCooldown = 40;
                        const cd = document.getElementById('currentColorDisplay');
                        cd.style.background = colors[colorIndex];
                        cd.style.boxShadow = `0 0 12px ${colors[colorIndex]}80`;
                    }

                    // Handle palm erase gesture
                    if (gesture === 'PALM') {
                        didAnyHandErase = true;
                        const eraseRadius = 80;

                        // Erase paths
                        const erasedGroupIds = new Set();
                        
                        for (let i = paths.length - 1; i >= 0; i--) {
                            const path = paths[i];
                            let erased = false;
                            
                            // If this path's group was already erased this frame, just remove it too
                            if (path.groupId && erasedGroupIds.has(path.groupId)) {
                                erased = true;
                            } else {
                                for (const pt of path.points) {
                                    const proj = project3D(pt.x, pt.y, pt.z || 0);
                                    const dist = Math.hypot(proj.x - palmX, proj.y - palmY);
                                    if (dist < eraseRadius) {
                                        erased = true;
                                        if (path.groupId) erasedGroupIds.add(path.groupId);
                                        break;
                                    }
                                }
                            }
                            
                            if (erased) {
                                const erasedPath = paths.splice(i, 1)[0];
                                currentEraseSession.push(erasedPath);
                            }
                        }
                    }

                    // Handle Shatter and Assemble
                    if (gesture === 'SHATTER' && shatterState !== 'SHATTERED' && gestureCooldown === 0) {
                        shatterState = 'SHATTERED';
                        gestureCooldown = 40;
                        particles = [];
                        paths.forEach(path => {
                            if (!path.shattered) {
                                path.shattered = true;
                                // Interpolate atoms along lines
                                for (let i = 0; i < path.points.length - 1; i++) {
                                    let p1 = path.points[i];
                                    let p2 = path.points[i + 1];
                                    let dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                                    let steps = Math.max(1, Math.floor(dist / 4)); // Density
                                    for (let j = 0; j <= steps; j++) {
                                        let t = j / steps;
                                        let tx = p1.x + (p2.x - p1.x) * t;
                                        let ty = p1.y + (p2.y - p1.y) * t;
                                        let tz = (p1.z || 0) + (((p2.z || 0) - (p1.z || 0)) * t);
                                        particles.push({
                                            x: tx, y: ty, z: tz,
                                            targetX: tx, targetY: ty, targetZ: tz,
                                            vx: (Math.random() - 0.5) * 30, // Explosive force
                                            vy: (Math.random() - 0.5) * 30,
                                            vz: (Math.random() - 0.5) * 30,
                                            color: path.color,
                                            scale: Math.random() * 2 + 2
                                        });
                                    }
                                }
                            }
                        });
                    }

                    if (gesture === 'ASSEMBLE' && shatterState === 'SHATTERED' && gestureCooldown === 0) {
                        shatterState = 'ASSEMBLING';
                        gestureCooldown = 40;
                    }

                    // Handle Undo
                    if (gesture === 'UNDO' && undoCooldown === 0) {
                        if (undoStack.length > 0) {
                            const toRestore = undoStack.pop();
                            paths.push(...toRestore);
                        }
                        undoCooldown = 30; // Prevent spamming
                    }

                    lastGestures[index] = gesture;

                    // Draw hand landmarks
                    // Hide the standard skeleton if erasing to emphasize the eraser tool
                    if (gesture !== 'PALM') {
                        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, { color: 'rgba(255, 255, 255, 0.2)', lineWidth: 2 });
                        drawLandmarks(canvasCtx, landmarks, { color: gesture === 'PINCH' ? '#ffffff' : colors[colorIndex], lineWidth: 1, radius: 2 });
                    }

                    // Cursor UI
                    canvasCtx.beginPath();
                    const pointerX = gesture === 'PINCH' ? pinchMidX : (gesture === 'PALM' ? palmX : px);
                    const pointerY = gesture === 'PINCH' ? pinchMidY : (gesture === 'PALM' ? palmY : py);

                    if (gesture === 'PALM') {
                        // Show a glowing eraser area
                        canvasCtx.arc(pointerX, pointerY, 80, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = 'rgba(255, 50, 50, 0.2)';
                        canvasCtx.fill();
                        canvasCtx.strokeStyle = 'rgba(255, 50, 50, 0.8)';
                        canvasCtx.lineWidth = 2;
                        canvasCtx.stroke();
                    } else if (gesture === 'ZOOM') {
                        // Show a rotation compass indicator
                        canvasCtx.arc(pointerX, pointerY, 25, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = 'rgba(100, 200, 255, 0.3)';
                        canvasCtx.fill();
                        canvasCtx.beginPath();
                        canvasCtx.arc(pointerX, pointerY, 10, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = '#00f0ff';
                        canvasCtx.fill();
                    } else {
                        const isDrawing = gesture === 'DRAW';
                        const cursorOuter = isDrawing ? Math.max(15, currentBrushSize * 2) : 15;
                        const cursorInner = isDrawing ? Math.max(8, currentBrushSize) : 8;

                        canvasCtx.arc(pointerX, pointerY, cursorOuter, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = (gesture === 'DRAW' || gesture === 'PINCH' || gesture === 'ZOOM') ? colors[colorIndex] + '80' : 'rgba(255, 255, 255, 0.3)';
                        canvasCtx.fill();

                        canvasCtx.beginPath();
                        canvasCtx.arc(pointerX, pointerY, cursorInner, 0, 2 * Math.PI);
                        canvasCtx.fillStyle = (gesture === 'DRAW' || gesture === 'PINCH' || gesture === 'ZOOM') ? colors[colorIndex] : 'white';
                        canvasCtx.fill();
                    }
                });

                // Dual pinch zooming & rotating step
                if (isDualPinch && sPinchXs[0] !== null && sPinchXs[1] !== null) {
                    const currentZoomDist = Math.hypot(sPinchXs[0] - sPinchXs[1], sPinchYs[0] - sPinchYs[1]);
                    const currentMidX = (sPinchXs[0] + sPinchXs[1]) / 2;
                    const currentMidY = (sPinchYs[0] + sPinchYs[1]) / 2;

                    // Zoom
                    if (lastZoomDist !== null) {
                        const zoomDelta = currentZoomDist - lastZoomDist;
                        sceneScale += zoomDelta * 0.002;
                        if (sceneScale < 0.1) sceneScale = 0.1;
                        if (sceneScale > 8.0) sceneScale = 8.0;
                    }
                    lastZoomDist = currentZoomDist;

                    // Rotate
                    if (lastDualPinchMidX !== null) {
                        const dx = currentMidX - lastDualPinchMidX;
                        const dy = currentMidY - lastDualPinchMidY;
                        sceneVelocityY -= dx * 0.0010; // Build up yaw velocity
                        sceneVelocityX += dy * 0.0010; // Build up pitch velocity
                    }
                    lastDualPinchMidX = currentMidX;
                    lastDualPinchMidY = currentMidY;

                } else {
                    lastZoomDist = null;
                    lastDualPinchMidX = null;
                    lastDualPinchMidY = null;
                }

                // End of Erase Session if no hands were erasing this frame 
                // but we had active erasure data
                if (!didAnyHandErase && currentEraseSession.length > 0) {
                    undoStack.push(currentEraseSession);
                    currentEraseSession = [];
                }

            } else {
                // No hands visible - clear all per-hand states
                isCurrentlyPinchings = [false, false];
                lastZoomDist = null;
                lastDualPinchMidX = null;
                lastDualPinchMidY = null;
                currentPaths = [null, null];
                draggedObjects = [null, null];
                lastGestures = ['HOVER', 'HOVER'];
                sPxs = [null, null]; sPys = [null, null];
                sPinchXs = [null, null]; sPinchYs = [null, null];
                sPalmXs = [null, null]; sPalmYs = [null, null];
                gestureHistory = [[], []];

                if (currentEraseSession.length > 0) {
                    undoStack.push(currentEraseSession);
                    currentEraseSession = [];
                }
            }

            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        // ENABLE MAX 2 HANDS FOR DUAL TRACKING!
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });
        camera.start();

    </script>
